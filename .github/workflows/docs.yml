name: Deploy docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one in-flight deployment, but don't cancel one already running.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install KaTeX (pinned in package.json)
        run: npm install

      - name: Build docs
        run: make docs

      - name: Stage deploy directory
        # The rendered HTML lives in www/html/, but it links to a few assets
        # that live elsewhere in the repo: the CSS files referenced by
        # www/jemdoc.conf's [defaultcss] block, the .jemdoc sources (because
        # `showsource` pages link back to them), and dist/jemdoc.vim (linked
        # from stuff.jemdoc).
        run: |
          mkdir -p _site
          cp -r www/html/. _site/
          cp css/jemdoc.css css/jacob.css _site/
          cp www/*.jemdoc _site/
          cp -r www/dist _site/dist

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
